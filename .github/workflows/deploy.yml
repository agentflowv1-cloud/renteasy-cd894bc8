name: Deploy to GCP Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-renteasy-cd894bc8
  cancel-in-progress: false

jobs:
  provision-infra:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: 'agentflow-496320'
      GCP_REGION: 'us-central1'
      GCP_SA_KEY_B64: ''
    steps:
      - uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate with GCP
        run: |
          echo '${{ env.GCP_SA_KEY_B64 }}' | base64 -d > /tmp/gcp-key.json
          gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
          gcloud config set project '${{ env.GCP_PROJECT_ID }}'

      - name: Ensure GCS state bucket exists
        run: |
          BUCKET="${{ env.GCP_PROJECT_ID }}-agentflow-tf-state"
          gsutil ls gs://$BUCKET 2>/dev/null || \
          gsutil mb -p ${{ env.GCP_PROJECT_ID }} gs://$BUCKET

      - name: Ensure Artifact Registry repository exists
        run: |
          REGION="${{ env.GCP_REGION }}"
          gcloud artifacts repositories describe agentflow \
            --location=$REGION --project=${{ env.GCP_PROJECT_ID }} 2>/dev/null || \
          gcloud artifacts repositories create agentflow \
            --repository-format=docker \
            --location=$REGION \
            --project=${{ env.GCP_PROJECT_ID }} \
            --description="AgentFlow generated application images" || true

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: provision-infra
    env:
      GCP_PROJECT_ID: 'agentflow-496320'
      GCP_REGION: 'us-central1'
      GCP_SA_KEY_B64: ''
    outputs:
      image: ${{ steps.push.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate with GCP
        run: |
          echo '${{ env.GCP_SA_KEY_B64 }}' | base64 -d > /tmp/gcp-key.json
          gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
          gcloud config set project '${{ env.GCP_PROJECT_ID }}'
          gcloud auth configure-docker '${{ env.GCP_REGION }}-docker.pkg.dev' --quiet

      - name: Build & push image
        id: push
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/agentflow/renteasy-cd894bc8"
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest
          echo "image=$IMAGE:${{ github.sha }}" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build
    env:
      GCP_PROJECT_ID: 'agentflow-496320'
      GCP_REGION: 'us-central1'
      GCP_SA_KEY_B64: ''
    outputs:
      service_url: ${{ steps.tf_out.outputs.service_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate with GCP
        run: |
          echo '${{ env.GCP_SA_KEY_B64 }}' | base64 -d > /tmp/gcp-key.json
          gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
          gcloud config set project '${{ env.GCP_PROJECT_ID }}'
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json" >> $GITHUB_ENV

      - name: Remove stale Terraform lock
        continue-on-error: true
        run: |
          gsutil rm gs://${{ env.GCP_PROJECT_ID }}-agentflow-tf-state/renteasy-cd894bc8/default.tflock 2>/dev/null || true

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: infra/terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ env.GCP_PROJECT_ID }}-agentflow-tf-state" \
            -backend-config="prefix=renteasy-cd894bc8"

      - name: Terraform Apply
        working-directory: infra/terraform
        run: |
          terraform apply -auto-approve \
            -var="project_id=${{ env.GCP_PROJECT_ID }}" \
            -var="region=${{ env.GCP_REGION }}" \
            -var="service_name=renteasy-cd894bc8" \
            -var="image=${{ needs.build.outputs.image }}"

      - name: Capture service URL
        id: tf_out
        working-directory: infra/terraform
        run: echo "service_url=$(terraform output -raw service_url)" >> $GITHUB_OUTPUT

      - name: Print service URL
        run: echo "Deployed to ${{ steps.tf_out.outputs.service_url }}"
